<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAT App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>
  .countdown-card{
  transition: all .4s ease;
}

.countdown-card.warning{

  background: linear-gradient(
    135deg,
    #7f1d1d,
    #dc2626,
    #f97316
  ) !important;

  box-shadow:
    0 0 20px rgba(239,68,68,.35),
    0 12px 35px rgba(249,115,22,.25);

  animation: countdownPulse 1.8s infinite;
}

@keyframes countdownPulse{

  0%,100%{
    transform: scale(1);
  }

  50%{
    transform: scale(1.02);
  }

}
  .premium-test-page{
  position:relative;
  padding-bottom:120px;
}

.timer-dot-live{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#ff5252;
  margin-bottom:6px;
  animation:pulse 1s infinite;
}
.ultra-timer{

  display:flex;
  align-items:center;
  gap:8px;

  height:40px;

  padding:0 14px;

  border-radius:999px;

  background:rgba(255,255,255,.12);

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,.18);

  box-shadow:
    0 6px 18px rgba(0,0,0,.18);

  overflow:hidden;
}

.live-ping{

  width:9px;
  height:9px;

  border-radius:50%;

  background:#ff3b30;

  box-shadow:
    0 0 8px #ff3b30,
    0 0 18px #ff3b30;

  animation:livePulse .9s infinite;
}

.live-text{

  color:#00e676;

  font-size:10px;

  font-weight:900;

  letter-spacing:1px;
}

.ultra-timer #floatingTimerText{
  color:#00ff88;
  font-size:17px;
  font-weight:900;
}
.ultra-timer{
  background:#0f172a;
  border:1px solid rgba(0,255,136,.35);

  box-shadow:
    0 0 15px rgba(0,255,136,.15),
    0 6px 18px rgba(0,0,0,.25);
}

@keyframes livePulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.6);
  }

  100%{
    transform:scale(1);
  }

}
.test-topbar{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
}

.attempt-box{

  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;

  padding:8px 12px;

  min-width:110px;
  height:40px;

  border-radius:12px;

  background:#1E293B;      /* rgba हटाएँ */

  border:1px solid #334155;

  box-shadow:none;

  color:#fff;

}
.attempt-label,
.attempt-total{
    color:#FFFFFF !important;
    opacity:1 !important;
    filter:none !important;
}

#attemptCount{
    color:#00FF88 !important;
    opacity:1 !important;
    filter:none !important;
    font-size:18px;
    font-weight:900;
}

.progress-wrap{
  width:100%;
  height:12px;
  background:#e0e0e0;
  border-radius:50px;
  overflow:hidden;
  margin-bottom:24px;
}

.premium-progress{
  width:0%;
  height:100%;
  background:
  linear-gradient(
    90deg,
    #00c853,
    #00e676
  );
  transition:.3s ease;
}

.premium-question-card{
  background:#fff;
  border-radius:28px;
  padding:24px;
  margin-bottom:22px
  scroll-margin-top:145px;;
  box-shadow:
  0 10px 30px rgba(0,0,0,.08);
}

.q-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.q-number{
  font-size:14px;
  font-weight:800;
  color:#666;
}

.q-badge{
  background:#fff8e1;
  color:#ff9800;
  padding:8px 14px;
  border-radius:50px;
  font-size:13px;
  font-weight:800;
}

.premium-question-text{

  font-size:20px;

  font-weight:800;

  line-height:1.7;

  margin-bottom:22px;

  color:#111827;

}
.premium-options{
  display:grid;
  gap:6px;
}

.premium-option{

  background:#f8f9ff;

  border:2px solid transparent;

  border-radius:16px;

  padding:10px 14px;

  display:flex;

  gap:10px;

  align-items:center;

  cursor:pointer;

  transition:.25s ease;
}

.premium-option:hover{
  transform:translateY(-2px);
}

.option-key{
  width:42px;
  height:42px;
  border-radius:14px;
  background:#304ffe;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
}

.option-value{

  flex:1;

  font-size:16px;

  font-weight:700;

  line-height:1.6;

  color:#111827 !important;

}
.premium-selected{
  border-color:#00c853;
  background:#ecfff1;
  box-shadow:
  0 8px 22px rgba(0,200,83,.18);
}

.premium-submit-btn{

  position:fixed;

  bottom:8px;

  left:50%;

  transform:translateX(-50%);

  width:130px;

  height:42px;

  border:none;

  border-radius:999px;

  background:linear-gradient(
    135deg,
    #00c853,
    #009624
  );

  color:#fff;

  font-size:15px;

  font-weight:800;

  z-index:9999;

  box-shadow:
    0 6px 16px rgba(0,200,83,.25);

}

  .test-actions{
  display:flex;
  gap:10px;
  margin-top:14px;
}

.completed-btn{
  flex:1;
  height:46px;
  border:none;
  border-radius:16px;
  background:#9e9e9e;
  color:#fff;
  font-size:15px;
  font-weight:700;
  box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.analysis-btn{
  width:140px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#00c853,#009624);
  color:#fff;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  transition:all .25s ease;
  box-shadow:0 6px 18px rgba(0,200,83,.35);
  position:relative;
  overflow:hidden;
}

.analysis-btn:hover{
  transform:translateY(-2px) scale(1.02);
}

.analysis-btn:before{
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.35),
    transparent
  );
  transition:.7s;
}

.analysis-btn:hover:before{
  left:100%;
}




.analysis-card:hover{

  transform:translateY(-4px);

}

.analysis-card.correct{

  border-left:8px solid #00c853;

}

.analysis-card.wrong{

  border-left:8px solid #ff1744;

}

.question-number{

  font-size:13px;

  font-weight:700;

  color:#666;

  margin-bottom:8px;

}

.question-text{

  font-size:24px;

  font-weight:800;

  line-height:1.5;

  color:#111827;

  margin-bottom:22px;

}

.answer-row strong{

  font-weight:800;

}


.analysis-navbar{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:22px;
}

.premium-back-btn:active{
  transform:scale(.9);
}

.analysis-mini{
  font-size:12px;
  color:#777;
  font-weight:700;
  letter-spacing:1px;
}

.analysis-big{
  font-size:28px;
  font-weight:900;
}

.premium-score-card{

  position:relative;
  overflow:hidden;

  background:linear-gradient(
    135deg,
    #0f172a 0%,
    #1e293b 55%,
    #312e81 100%
  );

  border:1px solid rgba(255,255,255,.08);

  border-radius:28px;

  padding:20px 16px;

  text-align:center;

  color:#fff;

  margin-bottom:18px;

  box-shadow:
    0 10px 30px rgba(15,23,42,.18);
}

.score-glow{
  position:absolute;

  top:-80px;
  right:-80px;

  width:180px;
  height:180px;

  border-radius:50%;

  background:radial-gradient(
    circle,
    rgba(99,102,241,.22),
    transparent 70%
  );
}

.score-ring{
  width:120px;
  height:120px;
  margin:auto;
  border-radius:50%;
  background:
  rgba(255,255,255,.14);
  display:flex;
  align-items:center;
  justify-content:center;
}

.score-ring-inner{
  width:92px;
  height:92px;
  border-radius:50%;
  background:
  rgba(255,255,255,.16);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.score-main{
  font-size:32px;
  font-weight:900;
  line-height:1;
}

.score-total{
  font-size:16px;
  opacity:.85;
}

.premium-accuracy{
  margin-top:12px;
  font-size:16px;
  font-weight:700;
  color:#cbd5e1;
}

.premium-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:16px;
}

.stat-box{

  background:rgba(255,255,255,.08);

  border:1px solid rgba(255,255,255,.08);

  border-radius:16px;

  padding:12px 8px;

  backdrop-filter:blur(12px);
}

.stat-label{
  font-size:13px;
}

.stat-value{
  margin-top:4px;
  font-size:20px;
  font-weight:800;
}

.premium-analysis-card{
  background:#fff;
  border-radius:28px;
  padding:24px;
  margin-bottom:22px;
  box-shadow:
  0 10px 30px rgba(0,0,0,.08);
}

.premium-correct{
  border-left:8px solid #00c853;
}

.premium-wrong{
  border-left:8px solid #ff1744;
}
.premium-unattempted{
  border-left:8px solid #7c3aed;
}

.question-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.question-badge{
  padding:8px 16px;
  border-radius:50px;
  font-weight:800;
  font-size:14px;
}

.badge-correct{
  background:#e8fff0;
  color:#00a63e;
}

.badge-wrong{
  background:#ffe8ec;
  color:#ff1744;
}
.badge-unattempted{
  background:#f3e8ff;
  color:#7c3aed;
}

.status-pill{
  padding:8px 14px;
  border-radius:50px;
  font-size:13px;
  font-weight:800;
  color:#fff;
}

.pill-correct{
  background:#00c853;
}

.pill-wrong{
  background:#ff1744;
}
.pill-unattempted{

  background:linear-gradient(
    135deg,
    #8b5cf6,
    #6366f1
  );

  color:#fff;

  box-shadow:
    0 8px 18px rgba(99,102,241,.28);

}

.premium-question{

  font-size:22px;

  font-weight:800;

  line-height:1.6;

  margin-bottom:20px;

  color:#111827 !important;

}

.premium-answer-card{
  padding:18px;
  border-radius:20px;
  margin-bottom:16px;
}

.user-card{
  background:#f8f9ff;
}

.correct-card-ui{
  background:#ecfff1;
}

.answer-title{
  font-size:13px;
  font-weight:700;
  color:#666;
  margin-bottom:10px;
}

.answer-value{

  font-size:17px;

  line-height:1.7;

  font-weight:700;

  color:#111827 !important;

}

.correct-answer-text{
  color:#00a63e;
}

.wrong-answer-text{
  color:#ff1744;
}
.unattempted-answer-text{
  color:#7c3aed;
}

.show-exp-btn{

  width:100%;

  border:none;

  border-radius:18px;

  background:
  linear-gradient(
    135deg,
    #304ffe,
    #1e40ff
  );

  color:#fff;

  padding:16px;

  font-size:15px;

  font-weight:800;

  margin-top:16px;

  cursor:pointer;

  transition:.3s ease;

  box-shadow:
  0 8px 22px rgba(41,79,254,.28);

}

.show-exp-btn:hover{

  transform:translateY(-2px);

}

.hidden-exp{

  max-height:0;

  overflow:hidden;

  transition:max-height .45s ease;

}

.exp-inner{

  margin-top:16px;

  background:
  linear-gradient(
    135deg,
    #f8f9ff,
    #eef3ff
  );

  border-radius:22px;

  padding:20px;

  font-size:16px;

  line-height:1.9;

  color:#333;

  border:1px solid #dfe7ff;

}

.analysis-loading{
  text-align:center;
  margin-top:100px;
}

.loader{
  width:60px;
  height:60px;
  border:5px solid #ddd;
  border-top:5px solid #00c853;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  100%{
    transform:rotate(360deg);
  }
}
/* ===== PREMIUM HERO V2 ===== */

.hero-v2{

  position:relative;
  overflow:hidden;

  background:
  linear-gradient(
    135deg,
    #17373d 0%,
    #1f4b5b 50%,
    #294e63 100%
  );

  border-radius:30px;

  padding:22px;

  margin-bottom:18px;

  box-shadow:
  0 15px 40px rgba(0,0,0,.18);

}

.hero-bg-glow{

  position:absolute;

  width:220px;
  height:220px;

  right:-80px;
  top:-80px;

  border-radius:50%;

  background:
  radial-gradient(
    circle,
    rgba(255,255,255,.10),
    transparent 70%
  );

}

.hero-top{

  display:flex;

  justify-content:space-between;

  align-items:center;

  position:relative;
  z-index:2;

}

.hero-greeting{

  color:#cbd5e1;

  font-size:13px;

  font-weight:700;

  letter-spacing:.8px;

}

.hero-name{
  margin-top:4px;
  font-size:26px;
  font-weight:900;
}

.hero-class{
  margin-top:8px;
}

.hero-divider{
  margin:16px 0;
}

.hero-avatar{

  width:64px;
  height:64px;

  border-radius:18px;

  background:
  linear-gradient(
    135deg,
    #3b82f6,
    #60a5fa
  );

  display:flex;

  align-items:center;

  justify-content:center;

  color:white;

  font-size:28px;

  font-weight:900;

  box-shadow:
  0 10px 25px rgba(59,130,246,.35);

}


.hero-title{

  color:white;

  font-size:20px;

  font-weight:800;

}

.hero-subtitle{

  margin-top:8px;

  color:#cbd5e1;

  font-size:14px;

  line-height:1.7;

}

.hero-features{

  margin-top:20px;

  display:flex;

  gap:10px;

  flex-wrap:wrap;

}

.feature-chip{

  padding:10px 14px;

  border-radius:999px;

  background:
  rgba(255,255,255,.08);

  color:white;

  font-size:12px;

  font-weight:700;

  backdrop-filter:blur(10px);

}
.hero-mini{

  color:#94A3B8;

  font-size:14px;

  font-weight:500;

}
.hero-v3{

  position:relative;

  overflow:hidden;

  padding:24px;

  border-radius:30px;

  background:
  linear-gradient(
    135deg,
    #0F172A,
    #111827,
    #1E293B
  );

  border:
  1px solid rgba(255,255,255,.08);

  color:#fff;

  box-shadow:
  0 20px 50px rgba(0,0,0,.35);

}

.hero-user{
  flex:1;
  min-width:0;
}

.hero-stats{

  margin-top:20px;

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:10px;

}

.hero-stat{

  flex-direction:column;

  justify-content:center;

  align-items:center;

  text-align:center;

  padding:14px 8px;

  min-height:92px;

}
.hero-stat span{
  font-size:22px;
}

.hero-stat h3{
  font-size:20px;
}

.hero-stat p{
  font-size:10px;
}

.hero-stat::after{

content:"";

position:absolute;

left:0;
bottom:0;

width:100%;
height:3px;

background:#3B82F6;

}

.hero-stat:nth-child(1)::after{
background:#F59E0B;
}

.hero-stat:nth-child(2)::after{
background:#3B82F6;
}

.hero-stat:nth-child(3)::after{
background:#22C55E;
}

.hero-stat:nth-child(4)::after{
background:#8B5CF6;
}


.hero-class{
  margin-top:10px;

  color:#cbd5e1;

  font-size:15px;
}

@media(max-width:420px){

  .hero-stats{
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .hero-stat{
    padding:14px 12px;
  }

  .hero-stat h3{
    font-size:18px;
  }

  .hero-stat p{
    font-size:11px;
  }
}
:root{

  --primary:#3B82F6;
  --success:#22C55E;
  --accent:#8B5CF6;
  --danger:#EF4444;

  --bg:#020617;

  --surface:#0F172A;
  --surface2:#111827;
  --surface3:#1E293B;

  --card:#FFFFFF;

  --border:rgba(255,255,255,.08);

  --text:#F8FAFC;
  --muted:#94A3B8;

}

*{box-sizing:border-box;margin:0;padding:0;}

body{

  font-family:'Poppins',sans-serif;

  background:
  linear-gradient(
    180deg,
    #020617 0%,
    #0F172A 100%
  );

  color:var(--text);

  -webkit-tap-highlight-color:transparent;

}

/* HEADER */
.header{

  position:sticky;
  top:0;
  z-index:9999;

  display:flex;
  align-items:center;
  justify-content:space-between;

  width:100%;
  max-width:420px;

  margin:0 auto;

  padding:10px 14px;

 background:
 linear-gradient(
 135deg,
 #0F172A,
 #111827
);

border-bottom:
1px solid rgba(255,255,255,.06);

box-shadow:
0 8px 30px rgba(0,0,0,.35);
}

.nav-left{

  display:flex;
  align-items:center;

  gap:10px;

  min-width:0;

  flex:1;
}

.logo-img{

  width:42px;
  height:42px;

  border-radius:50%;

  object-fit:cover;

  flex-shrink:0;

  border:2px solid rgba(255,255,255,.18);

  box-shadow:
    0 4px 12px rgba(0,0,0,.18);
}

.brand-wrap{

  display:flex;
  flex-direction:column;

  min-width:0;
}

.brand-title{

  color:#fff;

  font-size:15px;
  font-weight:800;

  line-height:1.1;

  white-space:nowrap;
}

.brand-subtitle{

  color:rgba(255,255,255,.72);

  font-size:11px;

  font-weight:600;

  letter-spacing:.8px;
}

.nav-right{

  display:flex;
  align-items:center;

  gap:8px;

  flex-shrink:0;
}

.nav-icon-btn,
.nav-logout-btn{

  height:38px;

  border:none;

  border-radius:12px;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  transition:.25s ease;
}

.nav-icon-btn{

  width:38px;

  background:rgba(255,255,255,.12);

  color:#fff;

  font-size:18px;
}

.nav-logout-btn{

  padding:0 14px;

  background:#ef4444;

  color:#fff;

  font-size:13px;
  font-weight:700;
}

.nav-icon-btn:hover,
.nav-logout-btn:hover{

  transform:translateY(-1px);
}

@media(max-width:420px){

  .header{

    padding:10px 12px;
  }

  .brand-title{

    font-size:14px;
  }

  .brand-subtitle{

    font-size:10px;
  }

  .nav-logout-btn{

    padding:0 12px;
    font-size:12px;
  }

}

/* WRAPPER */
.wrapper{
  max-width:440px;
  margin:auto;
  padding:12px;
}

/* LOGIN */
.login-card{
  background:var(--card);
  border-radius:18px;
  padding:26px 20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.05);
  text-align:center;
}

.logo{font-size:38px;margin-bottom:8px;}
.title{font-size:20px;font-weight:600;}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:18px;}

.input-box{
  display:flex;
  align-items:center;
  background:#f1f3f6;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}

.input-box input{
  border:none;
  outline:none;
  background:none;
  flex:1;
  font-size:14px;
}

.btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  font-size:15px;
  margin-top:8px;
  cursor:pointer;
}

/* DASHBOARD */
.test-card{
  background:var(--card);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 4px 14px rgba(0,0,0,0.04);
}

.test-name{
  font-size:15px;
  font-weight:600;
}

.meta{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--muted);
  margin-top:5px;
}

.start-btn{

/* =====================================================
   WORLD CLASS MISSION CARD - PHASE 2
   Replace:
   .mission-list
   .mission-item
   .mission-item:hover
   .mission-icon
   .mission-content
   .mission-content small
   .mission-content strong
   .mission-arrow
===================================================== */

.mission-list{

    display:flex;
    flex-direction:column;
    gap:16px;

}

.mission-item{

    position:relative;

    display:flex;
    align-items:center;

    gap:16px;

    padding:18px;

    border-radius:22px;

    background:
        linear-gradient(
            135deg,
            #ffffff,
            #f8fbff
        );

    border:1px solid rgba(59,130,246,.08);

    text-decoration:none;

    color:inherit;

    overflow:hidden;

    transition:
        transform .28s ease,
        box-shadow .28s ease,
        border-color .28s ease,
        background .28s ease;

    box-shadow:
        0 6px 18px rgba(15,23,42,.05);

}

.mission-item::before{

    content:"";

    position:absolute;

    left:0;
    top:0;

    width:5px;
    height:100%;

    background:
        linear-gradient(
            180deg,
            #3B82F6,
            #22C55E
        );

    opacity:.9;

}

.mission-item:hover{

    transform:translateY(-4px);

    border-color:rgba(59,130,246,.18);

    background:
        linear-gradient(
            135deg,
            #ffffff,
            #eef6ff
        );

    box-shadow:
        0 16px 34px rgba(59,130,246,.14);

}

.mission-icon{

    width:58px;
    height:58px;

    border-radius:18px;

    display:flex;
    align-items:center;
    justify-content:center;

    flex-shrink:0;

    font-size:28px;

    background:
        linear-gradient(
            135deg,
            #DBEAFE,
            #BFDBFE
        );

    box-shadow:
        0 10px 22px rgba(59,130,246,.18);

    transition:.30s;

}

.mission-item:hover .mission-icon{

    transform:scale(1.08) rotate(-5deg);

    box-shadow:
        0 16px 28px rgba(59,130,246,.25);

}

.mission-content{

    flex:1;

    min-width:0;

}

.mission-content small{

    display:block;

    margin-bottom:6px;

    color:#64748B;

    font-size:12px;

    font-weight:700;

    letter-spacing:.3px;

}

.mission-content strong{

    display:block;

    font-size:17px;

    font-weight:900;

    color:#0F172A;

    line-height:1.35;

    word-break:break-word;

}

.mission-arrow{

    width:42px;
    height:42px;

    border-radius:14px;

    display:flex;
    align-items:center;
    justify-content:center;

    flex-shrink:0;

    background:
        linear-gradient(
            135deg,
            #3B82F6,
            #2563EB
        );

    color:#ffffff;

    font-size:20px;

    font-weight:900;

    box-shadow:
        0 8px 18px rgba(59,130,246,.25);

    transition:
        transform .25s ease,
        box-shadow .25s ease;

}

.mission-item:hover .mission-arrow{

    transform:translateX(4px);

    box-shadow:
        0 14px 28px rgba(59,130,246,.35);

}

@media(max-width:420px){

    .mission-list{

        gap:14px;

    }

    .mission-item{

        padding:16px;

        border-radius:18px;

    }

    .mission-icon{

        width:52px;
        height:52px;

        font-size:24px;

    }

    .mission-content strong{

        font-size:15px;

    }

    .mission-arrow{

        width:38px;
        height:38px;

        font-size:18px;

    }

}

/* =====================================================
   WORLD CLASS MISSION CARD - PHASE 3
   FINAL POLISH
===================================================== */

/* ---------- Smooth Rendering ---------- */

.mission-card,
.mission-item,
.mission-icon,
.mission-arrow{

    backface-visibility:hidden;

    transform:translateZ(0);

    -webkit-font-smoothing:antialiased;

}

/* ---------- Premium Shine ---------- */

.mission-card::after{

    content:"";

    position:absolute;

    inset:0;

    background:
        linear-gradient(
            120deg,
            transparent 20%,
            rgba(255,255,255,.28) 48%,
            transparent 75%
        );

    transform:translateX(-150%);

    pointer-events:none;

}

.mission-card:hover::after{

    animation:missionShine 1.4s ease;

}

@keyframes missionShine{

    100%{

        transform:translateX(150%);

    }

}

/* ---------- Icon Colors ---------- */

.mission-item:nth-child(1) .mission-icon{

    background:
        linear-gradient(
            135deg,
            #DBEAFE,
            #BFDBFE
        );

}

.mission-item:nth-child(2) .mission-icon{

    background:
        linear-gradient(
            135deg,
            #FEF3C7,
            #FCD34D
        );

}

.mission-item:nth-child(3) .mission-icon{

    background:
        linear-gradient(
            135deg,
            #DCFCE7,
            #86EFAC
        );

}

/* ---------- Left Accent ---------- */

.mission-item:nth-child(1)::before{

    background:
        linear-gradient(
            180deg,
            #3B82F6,
            #2563EB
        );

}

.mission-item:nth-child(2)::before{

    background:
        linear-gradient(
            180deg,
            #F59E0B,
            #F97316
        );

}

.mission-item:nth-child(3)::before{

    background:
        linear-gradient(
            180deg,
            #22C55E,
            #16A34A
        );

}

/* ---------- Arrow Colors ---------- */

.mission-item:nth-child(1) .mission-arrow{

    background:
        linear-gradient(
            135deg,
            #3B82F6,
            #2563EB
        );

}

.mission-item:nth-child(2) .mission-arrow{

    background:
        linear-gradient(
            135deg,
            #F59E0B,
            #EA580C
        );

}

.mission-item:nth-child(3) .mission-arrow{

    background:
        linear-gradient(
            135deg,
            #22C55E,
            #15803D
        );

}

/* ---------- Hover ---------- */

.mission-item:hover{

    transform:
        translateY(-4px)
        scale(1.01);

}

/* ---------- Active ---------- */

.mission-item:active{

    transform:scale(.98);

}

/* ---------- Better Typography ---------- */

.mission-content strong{

    text-rendering:optimizeLegibility;

}

.mission-header h3{

    text-rendering:optimizeLegibility;

}

/* ---------- Mobile ---------- */

@media(max-width:420px){

.mission-card{

padding:18px;

border-radius:24px;

}

.mission-item{

gap:14px;

}

.mission-content small{

font-size:11px;

}

.mission-content strong{

font-size:15px;

}

.mission-arrow{

width:36px;

height:36px;

font-size:17px;

}

}

/* ---------- Reduce Motion ---------- */

@media(prefers-reduced-motion:reduce){

.mission-card,
.mission-item,
.mission-icon,
.mission-arrow{

animation:none;

transition:none;

}

}
